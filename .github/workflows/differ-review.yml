name: Differ Review

on:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Generate review
        run: |
          if [ -f SYSTEM_DELTA.json ] && [ -f topology.json ]; then
            node dist/cli.js review -b origin/main -o review.html
          else
            echo "No SYSTEM_DELTA.json or topology.json found, skipping review generation"
            exit 0
          fi

      - name: Upload review artifact
        if: hashFiles('review.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: differ-review
          path: review.html

      - name: Comment on PR
        if: hashFiles('review.html') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = `## Differ Review\n\nTopology review generated. [Download review.html](${runUrl}#artifacts) from the workflow artifacts and open in your browser.\n\n_Tip: The review shows the system topology with change overlay. Click nodes to drill into code._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Differ Review'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
