name: Differ Review

on:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Generate review
        run: |
          if [ -f SYSTEM_DELTA.json ] && [ -f topology.json ]; then
            node dist/cli.js review -b origin/main -o review.html
          else
            echo "No SYSTEM_DELTA.json or topology.json found, skipping review generation"
            exit 0
          fi

      - name: Upload review artifact
        if: hashFiles('review.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: differ-review
          path: review.html

      - name: Comment on PR
        if: hashFiles('review.html') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const delta = JSON.parse(fs.readFileSync('SYSTEM_DELTA.json', 'utf-8'));
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            let body = `## Differ Review\n\n`;
            body += `**Intent:** ${delta.intent}\n\n`;

            if (delta.changed && delta.changed.length) {
              body += `### Changes\n`;
              delta.changed.forEach(n => {
                body += `- **${n.id}** — ${n.summary}\n`;
              });
              body += '\n';
            }

            if (delta.added && delta.added.length) {
              body += `### Added\n`;
              delta.added.forEach(n => { body += `- \`${n}\`\n`; });
              body += '\n';
            }

            if (delta.removed && delta.removed.length) {
              body += `### Removed\n`;
              delta.removed.forEach(n => { body += `- \`${n}\`\n`; });
              body += '\n';
            }

            if (delta.blast_radius && delta.blast_radius.length) {
              body += `### Blast Radius\n`;
              body += delta.blast_radius.map(n => `\`${n}\``).join(', ') + '\n\n';
            }

            if (delta.decision_trace && delta.decision_trace.length) {
              body += `### Key Decisions\n`;
              delta.decision_trace.forEach(d => {
                body += `- **${d.decision}** — _${d.rationale}_\n`;
              });
              body += '\n';
            }

            if (delta.scope_violations && delta.scope_violations.length) {
              body += `### Scope Violations\n`;
              delta.scope_violations.forEach(v => { body += `- ${v}\n`; });
              body += '\n';
            }

            body += `---\n`;
            body += `[Download interactive review](${runUrl}#artifacts) — open \`review.html\` in your browser for the full topology visualization\n`;
            body += `\n_Tip: The interactive review shows a force-directed system graph. Click nodes to drill into structural changes and code diffs._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Differ Review'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
